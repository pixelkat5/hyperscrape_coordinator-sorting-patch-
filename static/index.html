<!DOCTYPE html>
<html>
    <head>
        <style>
            *
            {
                font-family: monospace;
                background-color: #1A1A1A;
                color: #FFF;
            }

            .stats
            {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
            }
            .stats-card
            {
                border: 2px white solid;
                margin: 1em;
                padding: 1em;
            }
            .stats-card > *
            {
                margin: 0;
            }
            .stats-card > h2
            {
                font-weight: normal;
            }

            .leaderboard-wrapper
            {
                width: calc(100% - 2em);
                padding: 1em;
                display: flex;
                flex-direction: column;
            }

            .leaderboard
            {
                width: 100%;
                border: 2px solid white;
            }

            .leaderboard img
            {
                width: 32px;
                height: 32px;
                margin-right: 1em;
                border-radius: 100%;
            }

            .leaderboard .user
            {
                display: flex;
                flex-direction: row;
                align-items: center;
            }

            .leaderboard th
            {
                text-align: left;
            }

            .leaderboard tr
            {
                border-bottom: solid white 2px;
                border-top: solid white 2px;
            }
        </style>
    </head>
    <body>
        <h1>Minerva Archival Stats</h1>
        <div class="stats">
            <div class="stats-card">
                <h1 id="downloaded_bytes"></h1>
                <h2>Downloaded</h2>
            </div>
            <div class="stats-card">
                <h1 id="total_bytes"></h1>
                <h2>Total Bytes</h2>
            </div>
            <div class="stats-card">
                <h1 id="current_speed"></h1>
                <h2>Download Speed</h2>
            </div>
            <div class="stats-card">
                <h1 id="active_workers"></h1>
                <h2>Active Workers</h2>
            </div>
            <div class="stats-card">
                <h1 id="assigned"></h1>
                <h2>Assigned Chunks</h2>
            </div>
            <div class="stats-card">
                <h1 id="completed_files"></h1>
                <h2>Completed Files</h2>
            </div>
            <div class="stats-card">
                <h1 id="total_files"></h1>
                <h2>Total Files</h2>
            </div>
        </div>
        <p style="width: 100%; text-align: center; margin-top: 3em;">Top Contributors</p>
        <div class="leaderboard-wrapper">
            <table class="leaderboard">
                <thead class="leaderboard_heading">
                    <tr>
                        <th>#</th>
                        <th>User</th>
                        <th>Chunks</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody id="leaderboard_body"></tbody>
            </table>
        </div>

        <script>
            const API_ROOT = "http://127.0.0.1:8082"
            function unitifier(raw)
            {
                if (raw > 1000000000000)
                {
                    return `${Math.round(raw/1000000000000 * 100) / 100}T`; // Weird rounding to get 2 decimals from this
                }
                if (raw > 1000000000)
                {
                    return `${Math.round(raw/1000000000 * 100) / 100}G`; // Weird rounding to get 2 decimals from this
                }
                if (raw > 1000000)
                {
                    return `${Math.round(raw/1000000 * 100) / 100}M`; // Weird rounding to get 2 decimals from this
                }
                if (raw > 1000)
                {
                    return `${Math.round(raw/1000 * 100) / 100}K`; // Weird rounding to get 2 decimals from this
                }
                return Math.round(raw * 100)/100;
            }
            async function refresh() {
                const status_response = await fetch(API_ROOT + "/api/stats");
                if (status_response.status == 200)
                {
                    const status = await status_response.json();
                    document.getElementById("downloaded_bytes").innerText = unitifier(status["downloaded_bytes"]) + 'B';
                    document.getElementById("total_bytes").innerText = unitifier(status["total_bytes"]) + 'B';
                    document.getElementById("current_speed").innerText = unitifier(status["current_speed"]) + "B/s";
                    document.getElementById("active_workers").innerText = status["active_workers"];
                    document.getElementById("assigned").innerText = status["assigned"];
                    document.getElementById("completed_files").innerText = status["completed_files"];
                    document.getElementById("total_files").innerText = status["total_files"];
                }

                const leaderboard_response = await fetch(API_ROOT + "/api/leaderboard");
                if (leaderboard_response.status == 200)
                {
                    const leaderboard_item_els = [];
                    const leaderboard_data = await leaderboard_response.json();
                    let i=1;
                    for (const leaderboard_item of leaderboard_data)
                    {
                        const leaderboard_row = document.createElement("tr");
                        const rank = document.createElement("th");
                        const user = document.createElement("td");
                        const downloaded_chunks = document.createElement("td");
                        const downloaded_data = document.createElement("td");

                        rank.innerText = i;
                        downloaded_chunks.innerText = leaderboard_item["downloaded_chunks"];
                        downloaded_data.innerText = unitifier(leaderboard_item["downloaded_bytes"]) + "B";

                        const image = document.createElement("img");
                        image.src = leaderboard_item["avatar_url"];
                        const username = document.createElement("span");
                        username.innerText = leaderboard_item["discord_username"];
                        user.classList.add("user");
                        user.appendChild(image);
                        user.appendChild(username);

                        leaderboard_row.appendChild(rank);
                        leaderboard_row.appendChild(user);
                        leaderboard_row.appendChild(downloaded_chunks);
                        leaderboard_row.appendChild(downloaded_data);

                        leaderboard_item_els.push(leaderboard_row);
                        i++;
                    }
                    document.getElementById("leaderboard_body").replaceChildren(...leaderboard_item_els);
                }
            }
            refresh();
            setInterval(refresh, 2000);
        </script>
    </body>
</html>
